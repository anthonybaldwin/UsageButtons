name: build

# Cross-compile the Stream Deck plugin for Windows + both Mac archs
# from a single Ubuntu runner. Bun's `--compile` supports all three
# targets (`bun-windows-x64`, `bun-darwin-arm64`, `bun-darwin-x64`)
# from any host, so there's no need to pay for per-OS runners. The
# macOS host-specific bits (chmod, quarantine strip) are handled by
# `bun run install:dev` at install time on the target machine.
#
# Triggers:
#   - push to main: main is the release branch, every green main
#     should produce an artifact.
#   - pull_request to main: gates merges on a green build+typecheck.
#   - workflow_dispatch: manual rebuild button from the Actions tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel a previous run of this workflow on the same ref when a new
# commit arrives. Saves runner minutes on rapid pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: cross-compile plugin (win + mac)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # --no-reload skips the kill/relaunch Stream Deck dance that
      # `bun run build` does locally. There's no Stream Deck process
      # on a CI runner anyway (the isStreamDeckRunning() check would
      # return false via pgrep), but passing --no-reload makes the
      # intent explicit and keeps the build output clean of the
      # "→ stopping Stream Deck" / "→ relaunching Stream Deck" lines.
      - name: Build Windows binary
        run: bun run scripts/build.ts win --no-reload

      - name: Build macOS native binaries (arm64 + x64 + wrapper)
        run: bun run scripts/build.ts mac --no-reload

      # Package the whole .sdPlugin folder as a .streamDeckPlugin
      # file. This is literally just a zip with a renamed extension —
      # Stream Deck installs it when the user double-clicks the file.
      # We use `zip -y` to preserve symlinks (none today but future-
      # proof) and explicitly set the executable bit on the three Mac
      # files in the archive so Gatekeeper on macOS doesn't choke on
      # a mode-0644 binary.
      - name: Package .streamDeckPlugin bundle
        run: |
          chmod +x io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac \
                   io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-arm64 \
                   io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-x64
          zip -ry io.github.anthonybaldwin.UsageButtons.streamDeckPlugin \
            io.github.anthonybaldwin.UsageButtons.sdPlugin \
            -x 'io.github.anthonybaldwin.UsageButtons.sdPlugin/logs/*'

      - name: Upload Windows binary
        uses: actions/upload-artifact@v7
        with:
          name: plugin-win
          path: io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-win.exe
          if-no-files-found: error

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v7
        with:
          name: plugin-mac
          path: |
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-arm64
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-x64
          if-no-files-found: error

      - name: Upload .streamDeckPlugin bundle
        uses: actions/upload-artifact@v7
        with:
          name: streamDeckPlugin
          path: io.github.anthonybaldwin.UsageButtons.streamDeckPlugin
          if-no-files-found: error
