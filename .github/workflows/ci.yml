name: ci

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build + vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./...

      - name: Install golangci-lint
        # `go install` uses the runner's Go toolchain (1.26 here) to build
        # golangci-lint. Prebuilt release binaries are built against older
        # Go (1.23/1.24) and refuse to load a config targeting go1.26+.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Lint (godoc coverage via revive)
        run: golangci-lint run --timeout=5m ./...

      - name: Build Windows binary
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-win.exe ./cmd/plugin/

      - name: Build macOS arm64 binary
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -o io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-arm64 ./cmd/plugin/

      - name: Build macOS amd64 binary
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -o io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-x64 ./cmd/plugin/

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: plugin-binaries
          retention-days: 7
          path: |
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-win.exe
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-arm64
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-x64
          if-no-files-found: error
