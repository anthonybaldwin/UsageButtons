name: ci

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build + vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint — godoc coverage via revive)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          args: --timeout=5m

      - name: Build Windows binary
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-win.exe ./cmd/plugin/

      - name: Build macOS arm64 binary
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -o io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-arm64 ./cmd/plugin/

      - name: Build macOS amd64 binary
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -o io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-x64 ./cmd/plugin/

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: plugin-binaries
          retention-days: 7
          path: |
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-win.exe
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-arm64
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-x64
          if-no-files-found: error
