name: ci

# Validate every push and PR: typecheck + cross-compile.
# This does NOT produce releases — see release.yml for that.
# Artifacts are uploaded with short retention for ad-hoc testing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: typecheck + cross-compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build Windows binary
        run: bun run scripts/build.ts win --no-reload

      - name: Build macOS binaries (arm64 + x64 + wrapper)
        run: bun run scripts/build.ts mac --no-reload

      # Upload artifacts with short retention for ad-hoc testing.
      # These are NOT releases — just CI validation artifacts.
      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: plugin-binaries
          retention-days: 7
          path: |
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-win.exe
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-arm64
            io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-x64
          if-no-files-found: error
