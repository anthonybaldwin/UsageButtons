name: release

# Build and publish a GitHub Release when a version tag is pushed.
#
# Workflow:
#   1. git tag v0.1.0 && git push --tags
#   2. This workflow fires, cross-compiles for win + mac
#   3. Injects the tag version into manifest.json
#   4. Packages the .streamDeckPlugin bundle (zip with renamed ext)
#   5. Creates a GitHub Release with the bundle attached
#
# Users download the .streamDeckPlugin file from the Release page
# and double-click to install it into Stream Deck.

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create releases

jobs:
  release:
    name: build + publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Extract semver from tag (v0.1.0 → 0.1.0) and convert to
      # Stream Deck's four-part format (0.1.0 → 0.1.0.0).
      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Stream Deck manifest requires exactly 4 dot-separated parts
          IFS='.' read -ra PARTS <<< "$TAG"
          SD_VERSION="${PARTS[0]:-0}.${PARTS[1]:-0}.${PARTS[2]:-0}.${PARTS[3]:-0}"
          echo "semver=$TAG" >> "$GITHUB_OUTPUT"
          echo "sd_version=$SD_VERSION" >> "$GITHUB_OUTPUT"

      # Stamp the version into manifest.json so the installed plugin
      # reports the correct version inside Stream Deck.
      - name: Inject version into manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.sd_version }}" \
            '.Version = $v' \
            io.github.anthonybaldwin.UsageButtons.sdPlugin/manifest.json \
            > manifest.tmp && mv manifest.tmp \
            io.github.anthonybaldwin.UsageButtons.sdPlugin/manifest.json

      - name: Build Windows binary
        run: bun run scripts/build.ts win --no-reload

      - name: Build macOS binaries (arm64 + x64 + wrapper)
        run: bun run scripts/build.ts mac --no-reload

      - name: Package .streamDeckPlugin bundle
        run: |
          chmod +x io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac \
                   io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-arm64 \
                   io.github.anthonybaldwin.UsageButtons.sdPlugin/bin/plugin-mac-x64
          zip -ry io.github.anthonybaldwin.UsageButtons.streamDeckPlugin \
            io.github.anthonybaldwin.UsageButtons.sdPlugin \
            -x 'io.github.anthonybaldwin.UsageButtons.sdPlugin/logs/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Usage Buttons ${{ steps.version.outputs.semver }}
          generate_release_notes: true
          files: io.github.anthonybaldwin.UsageButtons.streamDeckPlugin
