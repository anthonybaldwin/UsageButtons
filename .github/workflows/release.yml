name: release

# Build and publish a GitHub Release when a version tag is pushed.
#
# Workflow:
#   1. ./scripts/release.sh patch  (tags + pushes)
#   2. This workflow fires, cross-compiles for win + mac
#   3. Injects the tag version into manifest.json
#   4. Packages platform-specific .streamDeckPlugin bundles
#   5. Creates a GitHub Release with both bundles attached

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: build + publish release
    runs-on: ubuntu-latest

    env:
      PLUGIN_DIR: io.github.anthonybaldwin.UsageButtons.sdPlugin
      BIN_DIR: io.github.anthonybaldwin.UsageButtons.sdPlugin/bin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./...

      # Extract semver from tag (v0.1.0 → 0.1.0) and convert to
      # Stream Deck's four-part format (0.1.0 → 0.1.0.0).
      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          IFS='.' read -ra PARTS <<< "$TAG"
          SD_VERSION="${PARTS[0]:-0}.${PARTS[1]:-0}.${PARTS[2]:-0}.${PARTS[3]:-0}"
          echo "semver=$TAG" >> "$GITHUB_OUTPUT"
          echo "sd_version=$SD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Inject version into manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.sd_version }}" \
            '.Version = $v' \
            $PLUGIN_DIR/manifest.json \
            > manifest.tmp && mv manifest.tmp $PLUGIN_DIR/manifest.json

      - name: Build Windows binary
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o $BIN_DIR/plugin-win.exe ./cmd/plugin/

      - name: Build macOS binaries
        run: |
          GOOS=darwin GOARCH=arm64 go build -o $BIN_DIR/plugin-mac-arm64 ./cmd/plugin/
          GOOS=darwin GOARCH=amd64 go build -o $BIN_DIR/plugin-mac-x64 ./cmd/plugin/

      - name: Write macOS arch-dispatch wrapper
        run: |
          cat > $BIN_DIR/plugin-mac << 'WRAPPER'
          #!/bin/sh
          set -e
          dir="$(cd "$(dirname "$0")" && pwd)"
          case "$(uname -m)" in
            arm64|aarch64) exec "$dir/plugin-mac-arm64" "$@" ;;
            x86_64)        exec "$dir/plugin-mac-x64" "$@" ;;
            *)             echo "UsageButtons: unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          WRAPPER
          chmod +x $BIN_DIR/plugin-mac $BIN_DIR/plugin-mac-arm64 $BIN_DIR/plugin-mac-x64

      # Package platform-specific bundles
      - name: Package Windows .streamDeckPlugin
        run: |
          rm -f $BIN_DIR/plugin-mac $BIN_DIR/plugin-mac-arm64 $BIN_DIR/plugin-mac-x64
          zip -ry UsageButtons-Windows.streamDeckPlugin \
            $PLUGIN_DIR \
            -x "$PLUGIN_DIR/logs/*"

      - name: Package macOS .streamDeckPlugin
        run: |
          rm -f $BIN_DIR/plugin-win.exe
          GOOS=darwin GOARCH=arm64 go build -o $BIN_DIR/plugin-mac-arm64 ./cmd/plugin/
          GOOS=darwin GOARCH=amd64 go build -o $BIN_DIR/plugin-mac-x64 ./cmd/plugin/
          cat > $BIN_DIR/plugin-mac << 'WRAPPER'
          #!/bin/sh
          set -e
          dir="$(cd "$(dirname "$0")" && pwd)"
          case "$(uname -m)" in
            arm64|aarch64) exec "$dir/plugin-mac-arm64" "$@" ;;
            x86_64)        exec "$dir/plugin-mac-x64" "$@" ;;
            *)             echo "UsageButtons: unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          WRAPPER
          chmod +x $BIN_DIR/plugin-mac $BIN_DIR/plugin-mac-arm64 $BIN_DIR/plugin-mac-x64
          zip -ry UsageButtons-macOS.streamDeckPlugin \
            $PLUGIN_DIR \
            -x "$PLUGIN_DIR/logs/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Usage Buttons ${{ steps.version.outputs.semver }}
          generate_release_notes: true
          files: |
            UsageButtons-Windows.streamDeckPlugin
            UsageButtons-macOS.streamDeckPlugin
