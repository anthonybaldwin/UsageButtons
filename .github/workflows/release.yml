name: release

# Build and publish a GitHub Release when a version tag is pushed.
#
# Workflow:
#   1. git tag v0.1.0 && git push --tags  (or `bun run release patch`)
#   2. This workflow fires, cross-compiles for win + mac
#   3. Injects the tag version into manifest.json
#   4. Packages platform-specific .streamDeckPlugin bundles
#   5. Creates a GitHub Release with both bundles attached
#
# Two bundles are published — one per platform — so users only
# download the ~28 MB binary they need, not all three (~85 MB).

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create releases

jobs:
  release:
    name: build + publish release
    runs-on: ubuntu-latest

    env:
      PLUGIN_DIR: io.github.anthonybaldwin.UsageButtons.sdPlugin
      BIN_DIR: io.github.anthonybaldwin.UsageButtons.sdPlugin/bin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Extract semver from tag (v0.1.0 → 0.1.0) and convert to
      # Stream Deck's four-part format (0.1.0 → 0.1.0.0).
      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          IFS='.' read -ra PARTS <<< "$TAG"
          SD_VERSION="${PARTS[0]:-0}.${PARTS[1]:-0}.${PARTS[2]:-0}.${PARTS[3]:-0}"
          echo "semver=$TAG" >> "$GITHUB_OUTPUT"
          echo "sd_version=$SD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Inject version into manifest.json
        run: |
          jq --arg v "${{ steps.version.outputs.sd_version }}" \
            '.Version = $v' \
            $PLUGIN_DIR/manifest.json \
            > manifest.tmp && mv manifest.tmp $PLUGIN_DIR/manifest.json

      - name: Build Windows binary
        run: bun run scripts/build.ts win --no-reload

      - name: Build macOS binaries (arm64 + x64 + wrapper)
        run: bun run scripts/build.ts mac --no-reload

      # Package platform-specific bundles. Each contains only the
      # binary for that platform, keeping downloads ~28 MB instead
      # of ~85 MB for a universal bundle.
      #
      # Stream Deck resolves CodePathWin / CodePathMac from the
      # manifest, so including only one platform's binary is fine —
      # the other CodePath entry just points at a file that doesn't
      # exist, which Stream Deck ignores on the wrong OS.
      - name: Package Windows .streamDeckPlugin
        run: |
          rm -f $BIN_DIR/plugin-mac $BIN_DIR/plugin-mac-arm64 $BIN_DIR/plugin-mac-x64
          zip -ry UsageButtons-Windows.streamDeckPlugin \
            $PLUGIN_DIR \
            -x "$PLUGIN_DIR/logs/*"

      - name: Package macOS .streamDeckPlugin
        run: |
          rm -f $BIN_DIR/plugin-win.exe
          bun run scripts/build.ts mac --no-reload
          chmod +x $BIN_DIR/plugin-mac $BIN_DIR/plugin-mac-arm64 $BIN_DIR/plugin-mac-x64
          zip -ry UsageButtons-macOS.streamDeckPlugin \
            $PLUGIN_DIR \
            -x "$PLUGIN_DIR/logs/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Usage Buttons ${{ steps.version.outputs.semver }}
          generate_release_notes: true
          files: |
            UsageButtons-Windows.streamDeckPlugin
            UsageButtons-macOS.streamDeckPlugin
