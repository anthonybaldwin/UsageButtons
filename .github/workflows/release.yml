name: release

# Manually-dispatched release prep. Opens a PR that bumps both
# manifests; merging that PR triggers publish.yml which tags the
# release, cross-compiles, and attaches artifacts.
#
# Kick off from the GitHub Actions UI OR via:
#
#   gh workflow run release.yml --field bump=patch
#   gh workflow run release.yml --field bump=minor
#   gh workflow run release.yml --field bump=custom --field custom_version=0.5.0
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Custom semver (used only when bump=custom, e.g. 0.5.0)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  open-pr:
    name: bump + open release PR
    runs-on: ubuntu-latest
    env:
      PLUGIN_DIR: io.github.anthonybaldwin.UsageButtons.sdPlugin

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute new version
        id: version
        run: |
          MANIFEST="$PLUGIN_DIR/manifest.json"
          CURRENT=$(jq -r '.Version' "$MANIFEST")
          # Stream Deck stores x.y.z.0 — strip the trailing .0 to get semver.
          SEMVER_CURRENT=$(echo "$CURRENT" | awk -F. '{printf "%d.%d.%d", $1, $2, $3}')
          IFS='.' read -ra PARTS <<< "$SEMVER_CURRENT"
          MAJOR=${PARTS[0]:-0}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}

          case "${{ inputs.bump }}" in
            patch)  NEW="$MAJOR.$MINOR.$((PATCH+1))" ;;
            minor)  NEW="$MAJOR.$((MINOR+1)).0" ;;
            major)  NEW="$((MAJOR+1)).0.0" ;;
            custom)
              NEW="${{ inputs.custom_version }}"
              if [ -z "$NEW" ]; then
                echo "bump=custom requires the custom_version input" >&2
                exit 1
              fi
              ;;
          esac

          SD_VERSION="$NEW.0"
          TAG="v$NEW"
          BRANCH="release/$TAG"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists" >&2
            exit 1
          fi
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "branch $BRANCH already exists on origin" >&2
            exit 1
          fi

          echo "semver=$NEW" >> "$GITHUB_OUTPUT"
          echo "sd_version=$SD_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Bump manifests + push branch
        run: |
          jq --arg v "${{ steps.version.outputs.sd_version }}" \
            '.Version = $v' \
            $PLUGIN_DIR/manifest.json > plugin-manifest.tmp && \
            mv plugin-manifest.tmp $PLUGIN_DIR/manifest.json
          jq --arg v "${{ steps.version.outputs.semver }}" \
            '.version = $v' \
            chrome-extension/manifest.json > ext-manifest.tmp && \
            mv ext-manifest.tmp chrome-extension/manifest.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.version.outputs.branch }}"
          git add $PLUGIN_DIR/manifest.json chrome-extension/manifest.json
          git commit -m "chore(release): ${{ steps.version.outputs.semver }}"
          git push origin "${{ steps.version.outputs.branch }}"

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.version.outputs.branch }}" \
            --title "chore(release): ${{ steps.version.outputs.semver }}" \
            --body "$(cat <<EOF
          Release prep for **${{ steps.version.outputs.tag }}**.

          Bumps:
          - Plugin manifest \`Version\` → \`${{ steps.version.outputs.sd_version }}\`
          - Extension manifest \`version\` → \`${{ steps.version.outputs.semver }}\`

          Merging this PR triggers \`publish.yml\`, which tags \`${{ steps.version.outputs.tag }}\`, cross-compiles win/mac binaries, and attaches the \`.streamDeckPlugin\` bundles + extension zip to a GitHub Release.

          **Merge method matters:** use _Merge_ or _Rebase_ so the commit message stays \`chore(release): ${{ steps.version.outputs.semver }}\`. _Squash_ also works as long as the squash title isn't edited.
          EOF
          )"
