<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Usage Stat — Property Inspector</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
    }
    body { margin: 8px 12px; color: #e5e7eb; background: transparent; }
    label { display: block; margin: 10px 0 4px; font-weight: 600; }
    select, input { width: 100%; box-sizing: border-box; padding: 4px 6px;
      background: #111827; color: #f9fafb; border: 1px solid #374151;
      border-radius: 4px; font-size: 13px; }
    p.hint { margin: 10px 0 0; opacity: 0.65; font-size: 11px; }
  </style>
</head>
<body>
  <label for="provider">Provider</label>
  <select id="provider">
    <option value="mock">Mock (dev)</option>
    <option value="claude">Claude</option>
    <option value="codex">Codex</option>
  </select>

  <label for="metric">Metric</label>
  <select id="metric"></select>

  <p class="hint">
    More providers unlock as they ship. See <code>docs/codexbar-reference.md</code>
    in the repo for the implementation order.
  </p>

  <script>
    // Provider → list of (metric id, human label) pairs. Used to
    // repopulate the metric dropdown whenever the provider changes.
    // Keep this in sync with each provider's `metricIds` in
    // src/providers/*.ts.
    const METRICS = {
      mock: [
        ["session-percent", "Session % remaining"],
        ["weekly-percent",  "Weekly % remaining"],
        ["credits",         "Credits remaining"],
      ],
      claude: [
        ["session-percent",       "Session % remaining (5h)"],
        ["weekly-percent",        "Weekly % remaining"],
        ["weekly-sonnet-percent", "Weekly Sonnet % remaining"],
        ["weekly-opus-percent",   "Weekly Opus % remaining"],
        ["extra-usage-percent",   "Extra usage headroom %"],
        ["extra-usage-remaining", "Extra usage remaining ($)"],
        ["extra-usage-spent",     "Extra usage spent ($)"],
      ],
      codex: [
        ["session-percent",  "Session % remaining (5h)"],
        ["weekly-percent",   "Weekly % remaining"],
        ["credits-balance",  "Credits remaining"],
      ],
    };

    function populateMetrics(providerId, selectedMetric) {
      const metric = document.getElementById("metric");
      const list = METRICS[providerId] || [];
      const options = list.map(([value, label]) => {
        const opt = document.createElement("option");
        opt.value = value;
        opt.textContent = label;
        if (value === selectedMetric) opt.selected = true;
        return opt;
      });
      metric.replaceChildren(...options);
    }

    // Stream Deck calls this global with registration args when the
    // Property Inspector loads. Protocol:
    //   https://docs.elgato.com/streamdeck/sdk/references/property-inspector/
    let websocket = null;
    let uuid = null;
    let actionInfo = null;

    function connectElgatoStreamDeckSocket(port, inUUID, registerEvent, info, inActionInfo) {
      uuid = inUUID;
      actionInfo = JSON.parse(inActionInfo);
      websocket = new WebSocket("ws://127.0.0.1:" + port);

      websocket.onopen = () => {
        websocket.send(JSON.stringify({ event: registerEvent, uuid: inUUID }));
      };

      const settings = actionInfo.payload.settings || {};
      const providerId = settings.providerId || "mock";
      const metricId = settings.metricId || "session-percent";
      document.getElementById("provider").value = providerId;
      populateMetrics(providerId, metricId);
    }

    function pushSettings() {
      if (!websocket || websocket.readyState !== WebSocket.OPEN) return;
      const payload = {
        providerId: document.getElementById("provider").value,
        metricId: document.getElementById("metric").value,
      };
      websocket.send(JSON.stringify({
        event: "setSettings",
        context: uuid,
        payload,
      }));
    }

    document.getElementById("provider").addEventListener("change", () => {
      populateMetrics(document.getElementById("provider").value);
      pushSettings();
    });
    document.getElementById("metric").addEventListener("change", pushSettings);

    // Initialise even if Stream Deck hasn't called connectElgato yet
    // (so the dropdown isn't empty when opened in a browser for dev).
    populateMetrics("mock", "session-percent");

    window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
  </script>
</body>
</html>
