<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Usage Stat — Property Inspector</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
    }
    body { margin: 8px 12px; color: #e5e7eb; background: transparent; }
    label { display: block; margin: 10px 0 4px; font-weight: 600; }
    select, input[type=text] { width: 100%; box-sizing: border-box; padding: 4px 6px;
      background: #111827; color: #f9fafb; border: 1px solid #374151;
      border-radius: 4px; font-size: 13px; }
    input[type=color] { width: 44px; height: 26px; padding: 0; border: 1px solid #374151;
      border-radius: 4px; background: transparent; cursor: pointer; }
    .row { display: flex; align-items: center; gap: 8px; }
    .row > label { margin: 0; flex: 1; font-weight: 600; }
    .checkbox-row { display: flex; align-items: center; gap: 6px; margin-top: 10px; }
    .checkbox-row label { margin: 0; font-weight: 600; }
    p.hint { margin: 10px 0 0; opacity: 0.65; font-size: 11px; }
    hr { border: none; border-top: 1px solid #374151; margin: 14px 0 0; }
    .section {
      background: #0b1220;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 8px 10px 12px;
      margin-bottom: 12px;
    }
    .section h3 {
      margin: 0 0 2px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="section" id="globalSection">
    <h3>Plugin settings · applies to every Usage Button</h3>
    <label for="defaultRefresh">Default refresh interval</label>
    <select id="defaultRefresh">
      <option value="5">5 minutes</option>
      <option value="10">10 minutes</option>
      <option value="15" selected>15 minutes</option>
      <option value="30">30 minutes</option>
      <option value="60">1 hour</option>
    </select>
  </div>

  <label for="provider">Provider</label>
  <select id="provider">
    <option value="mock">Mock (dev)</option>
    <option value="claude">Claude</option>
    <option value="codex">Codex</option>
  </select>

  <label for="metric">Metric</label>
  <select id="metric"></select>

  <label for="refreshMinutes">Refresh interval (this button)</label>
  <select id="refreshMinutes">
    <option value="">Use plugin default</option>
    <option value="5">5 minutes</option>
    <option value="10">10 minutes</option>
    <option value="15">15 minutes</option>
    <option value="30">30 minutes</option>
    <option value="60">1 hour</option>
  </select>

  <hr>

  <label for="labelOverride">Label override (blank = provider default)</label>
  <input id="labelOverride" type="text" placeholder="e.g. CLAUDE">

  <div class="checkbox-row">
    <input id="hideLabel" type="checkbox">
    <label for="hideLabel">Hide built-in label</label>
  </div>

  <div class="checkbox-row">
    <input id="invertFill" type="checkbox">
    <label for="invertFill">Invert fill (show "used" instead of "remaining")</label>
  </div>

  <label for="fillDirection">Fill direction</label>
  <select id="fillDirection">
    <option value="up">Up (default)</option>
    <option value="down">Down</option>
    <option value="right">Right</option>
    <option value="left">Left</option>
  </select>

  <div class="row">
    <label for="fillColor">Fill color</label>
    <input id="fillColor" type="color" value="#3b82f6">
  </div>

  <div class="row">
    <label for="bgColor">Background color</label>
    <input id="bgColor" type="color" value="#111827">
  </div>

  <p class="hint">
    Click the key on your Stream Deck to force an immediate refresh.
    Set a title in the box at the top of this panel to add overlay text.
  </p>

  <script>
    const METRICS = {
      mock: [
        ["session-percent", "Session % remaining"],
        ["weekly-percent",  "Weekly % remaining"],
        ["credits",         "Credits remaining"],
      ],
      claude: [
        ["session-percent",       "Session % remaining (5h)"],
        ["weekly-percent",        "Weekly % remaining"],
        ["weekly-sonnet-percent", "Sonnet % remaining (weekly)"],
        ["extra-usage-percent",   "Extra usage headroom %"],
        ["extra-usage-remaining", "Extra usage remaining ($)"],
        ["extra-usage-spent",     "Extra usage spent ($)"],
      ],
      codex: [
        ["session-percent",  "Session % remaining (5h)"],
        ["weekly-percent",   "Weekly % remaining"],
        ["credits-balance",  "Credits remaining"],
      ],
    };

    function populateMetrics(providerId, selectedMetric) {
      const metric = document.getElementById("metric");
      const list = METRICS[providerId] || [];
      const options = list.map(([value, label]) => {
        const opt = document.createElement("option");
        opt.value = value;
        opt.textContent = label;
        if (value === selectedMetric) opt.selected = true;
        return opt;
      });
      metric.replaceChildren(...options);
    }

    let websocket = null;
    let uuid = null;
    let actionInfo = null;

    function applyKeySettings(settings) {
      const providerId = settings.providerId || "mock";
      const metricId = settings.metricId || "session-percent";
      document.getElementById("provider").value = providerId;
      populateMetrics(providerId, metricId);
      document.getElementById("refreshMinutes").value =
        settings.refreshMinutes != null ? String(settings.refreshMinutes) : "";
      document.getElementById("labelOverride").value = settings.labelOverride || "";
      document.getElementById("hideLabel").checked = !!settings.hideLabel;
      document.getElementById("invertFill").checked = !!settings.invertFill;
      document.getElementById("fillDirection").value = settings.fillDirection || "up";
      if (settings.fillColor) document.getElementById("fillColor").value = settings.fillColor;
      if (settings.bgColor)   document.getElementById("bgColor").value   = settings.bgColor;
    }

    function applyGlobalSettings(globals) {
      const minutes = globals && globals.defaultRefreshMinutes;
      document.getElementById("defaultRefresh").value =
        [5, 10, 15, 30, 60].includes(minutes) ? String(minutes) : "15";
    }

    function connectElgatoStreamDeckSocket(port, inUUID, registerEvent, info, inActionInfo) {
      uuid = inUUID;
      actionInfo = JSON.parse(inActionInfo);
      websocket = new WebSocket("ws://127.0.0.1:" + port);
      websocket.onopen = () => {
        websocket.send(JSON.stringify({ event: registerEvent, uuid: inUUID }));
        // Pull the plugin-wide settings so the global section
        // reflects whatever the user already has configured across
        // their other Usage Buttons.
        websocket.send(JSON.stringify({ event: "getGlobalSettings", context: inUUID }));
      };
      websocket.onmessage = (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        if (msg.event === "didReceiveGlobalSettings") {
          applyGlobalSettings(msg.payload && msg.payload.settings);
        }
      };
      applyKeySettings(actionInfo.payload.settings || {});
    }

    function pushSettings() {
      if (!websocket || websocket.readyState !== WebSocket.OPEN) return;
      const refreshRaw = document.getElementById("refreshMinutes").value;
      const payload = {
        providerId:    document.getElementById("provider").value,
        metricId:      document.getElementById("metric").value,
        refreshMinutes: refreshRaw === "" ? undefined : Number(refreshRaw),
        labelOverride: document.getElementById("labelOverride").value,
        hideLabel:     document.getElementById("hideLabel").checked,
        invertFill:    document.getElementById("invertFill").checked,
        fillDirection: document.getElementById("fillDirection").value,
        fillColor:     document.getElementById("fillColor").value,
        bgColor:       document.getElementById("bgColor").value,
      };
      websocket.send(JSON.stringify({
        event: "setSettings",
        context: uuid,
        payload,
      }));
    }

    function pushGlobalSettings() {
      if (!websocket || websocket.readyState !== WebSocket.OPEN) return;
      const payload = {
        defaultRefreshMinutes: Number(document.getElementById("defaultRefresh").value),
      };
      websocket.send(JSON.stringify({
        event: "setGlobalSettings",
        context: uuid,
        payload,
      }));
    }

    document.getElementById("provider").addEventListener("change", () => {
      populateMetrics(document.getElementById("provider").value);
      pushSettings();
    });
    for (const id of [
      "metric", "refreshMinutes", "labelOverride", "hideLabel", "invertFill",
      "fillDirection", "fillColor", "bgColor",
    ]) {
      document.getElementById(id).addEventListener("change", pushSettings);
    }
    document.getElementById("defaultRefresh").addEventListener("change", pushGlobalSettings);

    applyKeySettings({});
    window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
  </script>
</body>
</html>
